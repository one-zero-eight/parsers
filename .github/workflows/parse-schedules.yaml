name: "Parse schedules рҹ•өпёҸвҖҚвҷӮпёҸ"
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    name: "Parse schedules рҹ•өпёҸвҖҚ"
    runs-on: ubuntu-latest
    steps:
      - name: "Check out repository рҹҡҡ"
        uses: actions/checkout@v5
      - name: "Pull the latest changes рҹ”„"
        run: git pull
      - name: "Set up uv рҹҡҖ"
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false
          activate-environment: true
      - name: "Parse schedules рҹ•өпёҸвҖҚвҷӮпёҸ"
        env:
          PARSER_AUTH_KEY: ${{ secrets.PARSER_AUTH_KEY }}
          INNOHASSLE_API_URL: "https://api.innohassle.ru/events/v0"
        run: uv run -m src
